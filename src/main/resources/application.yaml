spring:
  application:
    name: spring-ai-demo
  profiles:
    active: local
  ai:
    dashscope:
      # 本地/CI 请设置环境变量 DASHSCOPE_API_KEY，勿将真实密钥提交到仓库
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
    mcp:
      client:
        sse:
          connections:
            server:
              url: http://localhost:8127
#        stdio:
#          servers-configuration: classpath:mcp-servers.json
# 向量存储
vectorstore:
  pgvector:
    index-type: HNSW
    dimensions: 1536
    distance-type: COSINE_DISTANCE
    max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
  # 内存数据库
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.spring_ai_demo.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
# searchAPI
search-api:
  api-key: ${SEARCH_API_KEY:}
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG

